version: 2

models:
  - name: stg_google_ads__campaigns
    description: "One row per Google Ads campaign, with budget and bidding configuration."
    columns:
      - name: campaign_id
        description: "Primary key. Unique identifier for the Google Ads campaign."
        tests: [unique, not_null]
      - name: campaign_name
        description: "Human-readable campaign name."
      - name: campaign_status
        description: "Campaign serving status (e.g. ENABLED, PAUSED, REMOVED)."
      - name: budget_amount_usd
        description: "Configured campaign budget in USD."

  - name: stg_google_ads__ad_groups
    description: "One row per Google Ads ad group, nested within a campaign."
    columns:
      - name: ad_group_id
        description: "Primary key. Unique identifier for the ad group."
        tests: [unique, not_null]
      - name: campaign_id
        description: "Foreign key to the parent campaign."
      - name: cpc_bid_usd
        description: "Default cost-per-click bid in USD for the ad group."

  - name: stg_google_ads__ads
    description: "One row per Google Ads ad creative, nested within an ad group."
    columns:
      - name: ad_id
        description: "Primary key. Unique identifier for the ad creative."
        tests: [unique, not_null]
      - name: ad_group_id
        description: "Foreign key to the parent ad group."
      - name: headline
        description: "Primary headline text shown in the ad."

  - name: stg_google_ads__campaign_stats
    description: "Daily Google Ads performance metrics at the campaign grain."
    columns:
      - name: campaign_stat_id
        description: "Primary key. Unique identifier for the daily campaign stat row."
        tests: [unique, not_null]
      - name: campaign_id
        description: "Foreign key to the campaign these stats belong to."
      - name: date_day
        description: "Calendar day the stats were recorded."
      - name: cost_usd
        description: "Ad spend in USD for the campaign on that day."
      - name: conversions
        description: "Number of conversions attributed to the campaign that day."

  - name: stg_facebook_ads__campaigns
    description: "One row per Facebook Ads campaign, with objective and budget."
    columns:
      - name: campaign_id
        description: "Primary key. Unique identifier for the Facebook Ads campaign."
        tests: [unique, not_null]
      - name: campaign_name
        description: "Human-readable campaign name."
      - name: campaign_objective
        description: "Optimization objective (e.g. LEAD_GENERATION, TRAFFIC)."

  - name: stg_facebook_ads__ad_sets
    description: "One row per Facebook Ads ad set, the targeting and budget unit."
    columns:
      - name: ad_set_id
        description: "Primary key. Unique identifier for the ad set."
        tests: [unique, not_null]
      - name: campaign_id
        description: "Foreign key to the parent campaign."
      - name: optimization_goal
        description: "What the ad set is optimized for (e.g. LEADS, LINK_CLICKS)."

  - name: stg_facebook_ads__ads
    description: "One row per Facebook Ads ad creative, nested within an ad set."
    columns:
      - name: ad_id
        description: "Primary key. Unique identifier for the ad creative."
        tests: [unique, not_null]
      - name: ad_set_id
        description: "Foreign key to the parent ad set."
      - name: creative_format
        description: "Creative format (e.g. SINGLE_IMAGE, CAROUSEL, VIDEO)."

  - name: stg_facebook_ads__ad_insights
    description: "Daily Facebook Ads performance metrics at the campaign grain."
    columns:
      - name: ad_insight_id
        description: "Primary key. Unique identifier for the daily insight row."
        tests: [unique, not_null]
      - name: campaign_id
        description: "Foreign key to the campaign these insights belong to."
      - name: date_day
        description: "Calendar day the insights were recorded."
      - name: spend_usd
        description: "Ad spend in USD for the campaign on that day."
      - name: leads
        description: "Number of leads generated by the campaign that day."

  - name: stg_hubspot__email_campaigns
    description: "One row per HubSpot email marketing campaign sent."
    columns:
      - name: email_campaign_id
        description: "Primary key. Unique identifier for the email campaign."
        tests: [unique, not_null]
      - name: campaign_name
        description: "Internal name of the email campaign."
      - name: subject_line
        description: "Subject line shown to recipients."
      - name: num_recipients
        description: "Number of recipients the campaign was sent to."

  - name: stg_hubspot__email_events
    description: "One row per recipient-level email event (sent, open, click, bounce, unsubscribe)."
    columns:
      - name: email_event_id
        description: "Primary key. Unique identifier for the email event."
        tests: [unique, not_null]
      - name: email_campaign_id
        description: "Foreign key to the email campaign the event belongs to."
      - name: contact_id
        description: "Foreign key to the contact who triggered the event."
      - name: event_type
        description: "Type of email event (sent, open, click, bounce, unsubscribe)."
      - name: date_day
        description: "Calendar day the event occurred."

  - name: stg_hubspot__contacts
    description: "One row per HubSpot marketing contact / prospect."
    columns:
      - name: contact_id
        description: "Primary key. Unique identifier for the contact."
        tests: [unique, not_null]
      - name: email
        description: "Contact email address."
      - name: lifecycle_stage
        description: "CRM lifecycle stage (e.g. subscriber, lead, customer)."
      - name: lead_source
        description: "Channel that originally sourced the contact."
