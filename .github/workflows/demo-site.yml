name: Deploy Demo Site

on:
  push:
    branches: [main]
    paths:
      - 'examples/jaffle-shop/**'
      - 'src/docglow/**'
      - 'frontend/**'
      - '.github/workflows/demo-site.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Copy frontend assets to static
        run: |
          rm -rf src/docglow/static/assets/*
          cp frontend/dist/assets/* src/docglow/static/assets/
          cp frontend/dist/index.html src/docglow/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docglow
        run: pip install .

      - name: Prepare PostHog snippet
        run: sed "s/POSTHOG_API_KEY/${{ secrets.POSTHOG_API_KEY }}/" examples/jaffle-shop/posthog.html > /tmp/posthog.html

      - name: Generate demo site
        run: docglow generate --project-dir examples/jaffle-shop --output-dir demo-output --static --enable-erd --head-script /tmp/posthog.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy demo-output --project-name=docglow-demo --commit-dirty=true
